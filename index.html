<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRC | Rivals Clan</title>
    <style>
        :root { --bg-dark: #050505; --accent: #71ff9b; --text-color: white; --nav-bg: rgba(11, 11, 11, 0.9); --section-bg: #0f0f0f; }
        .light-mode { --bg-dark: #f0f0f0; --accent: #007bff; --text-color: #333; --nav-bg: rgba(255, 255, 255, 0.95); --section-bg: #e8e8e8; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s; }
        body { font-family: 'Segoe UI', Arial, sans-serif; color: var(--text-color); background: radial-gradient(circle at center, #2f2f2f, #111, var(--bg-dark)); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        .light-mode body { background: #f0f0f0; }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .navbar { position: fixed; top: 0; width: 100%; background: var(--nav-bg); border-bottom: 1px solid #222; display: flex; justify-content: center; align-items: center; gap: 20px; padding: 18px; z-index: 1000; }
        .navbar a, .navbar span { color: var(--text-color); font-weight: bold; cursor: pointer; }

        .container { max-width: 900px; margin: auto; padding: 150px 20px; text-align: center; }
        .logo { width: 180px; height: 180px; border-radius: 30px; border: 2px solid #333; }
        .badge { padding: 8px 18px; border-radius: 50px; background: #111; color: var(--accent); border: 1px solid var(--accent); display: inline-block; }
        .section { background: var(--section-bg); padding: 40px; border-radius: 20px; margin-top: 50px; }
        .join-btn { padding: 15px 30px; background: var(--accent); border-radius: 10px; color: black; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#home">Home</a>
    <a href="#developers">Developers</a>
    <a href="#announcements">Announcements</a>
    <span id="navActive" style="color:var(--accent)">Active: Loading...</span>
    <select onchange="changeLang(this.value)" style="background:#222; color:white; border-radius:5px;">
        <option value="en">English</option>
        <option value="tr">Türkçe</option>
    </select>
    <button onclick="document.body.classList.toggle('light-mode')" style="cursor:pointer;">Theme</button>
</nav>

<div class="container">
    <img src="logo.png" class="logo">
    <div class="badge" id="recruiting">🟢 Recruiting Now</div>
    <h1>XRC | Rivals Clan</h1>
    <a href="https://discord.gg/2dE9NAVHeb" target="_blank" class="join-btn">Join Discord</a>

    <div class="section" id="announcements">
        <h2 id="annTitle">Announcements</h2>
        <div id="annText" style="margin-top:20px; text-align:left; background:#151515; padding:20px; border-radius:10px;">
            🚀 v0.03 Update<br>✅ Light mode added<br>✅ Theme switcher active
        </div>
    </div>
</div>

<script>
fetch('https://discord.com/api/guilds/1513976181056082061/widget.json')
    .then(response => response.json())
    .then(data => { document.getElementById('navActive').innerText = 'Active: ' + data.presence_count; });

function changeLang(lang) { /* Dil mantığını korudum */ }
</script>
</body>
</html>
