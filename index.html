<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XRC | Rivals Clan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    color:white;

    background:
    radial-gradient(circle at top, #2a2a2a 0%, #111111 35%, #050505 100%);
}

.container{
    text-align:center;
    max-width:800px;
    padding:40px;
}

.logo{
    width:220px;
    margin-bottom:25px;
    filter:
        drop-shadow(0 0 20px rgba(255,255,255,.08))
        drop-shadow(0 0 50px rgba(255,255,255,.05));
}

h1{
    font-size:56px;
    margin-bottom:12px;
}

.subtitle{
    color:#b0b0b0;
    font-size:20px;
    margin-bottom:35px;
}

.desc{
    color:#d0d0d0;
    font-size:18px;
    line-height:1.7;
    margin-bottom:45px;
}

.join-btn{
    display:inline-block;
    padding:18px 40px;
    border-radius:14px;
    text-decoration:none;
    color:white;
    font-size:20px;
    font-weight:bold;

    background:linear-gradient(135deg,#3b3b3b,#1f1f1f);

    border:1px solid #555;

    transition:0.25s;
}

.join-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px rgba(255,255,255,.15);
}

.footer{
    margin-top:50px;
    color:#777;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>XRC | Rivals Clan</h1>

<p class="subtitle">
Official Rivals Clan Community
</p>

<p class="desc">
Join XRC and become part of our growing Rivals community.
Compete with skilled players, participate in clan events,
and help build the strongest Rivals community.
</p>

<a href="https://discord.gg/2dE9NAVHeb"
target="_blank"
class="join-btn">
Join Discord
</a>

<div class="footer">
XRC Rivals Clan © 2026
</div>

</div>

</body>
</html>
