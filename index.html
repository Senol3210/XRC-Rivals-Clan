<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRC | Rivals Clan</title>
    <style>
        :root { --bg-dark: #050505; --accent-green: #71ff9b; --accent-blue: #007bff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; color: white; background: radial-gradient(circle at center, #2f2f2f, #111, #050505); background-size: 400% 400%; animation: gradientBG 15s ease infinite, fadeIn 1s ease forwards; opacity: 0; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(113, 255, 155, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(113, 255, 155, 0); } 100% { box-shadow: 0 0 0 0 rgba(113, 255, 155, 0); } }
        
        .navbar { position: fixed; top: 0; width: 100%; background: rgba(11, 11, 11, 0.95); border-bottom: 1px solid #222; display: flex; justify-content: center; align-items: center; gap: 15px; padding: 15px; z-index: 1000; flex-wrap: wrap; }
        .navbar a, .navbar span { color: #ddd; text-decoration: none; font-weight: bold; position: relative; transition: 0.3s; font-size: 0.9em; }
        .navbar a::after { content: ''; position: absolute; left: 0; bottom: -5px; width: 0; height: 2px; background: var(--accent-green); transition: 0.3s; }
        .navbar a:hover::after { width: 100%; }
        
        .container { max-width: 900px; margin: auto; padding: 120px 20px 50px 20px; text-align: center; }
        .logo { width: 150px; height: 150px; border-radius: 30px; animation: float 3s ease-in-out infinite; border: 2px solid #333; object-fit: cover; }
        .badge { display: inline-block; padding: 8px 18px; border-radius: 50px; background: #111; color: var(--accent-green); animation: pulse 2s infinite; font-weight: bold; font-size: 0.9em; border: 1px solid #222; margin-top: 20px; }
        .section { background: #0f0f0f; padding: 30px; border-radius: 20px; margin-top: 40px; border: 1px solid #222; }
        .profile-card { display: inline-block; padding: 20px; border-radius: 20px; transition: 0.3s; border: 1px solid transparent; }
        .profile { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; }
        .join-btn { display: inline-block; margin-top: 20px; padding: 15px 30px; background: #222; border-radius: 10px; color: white; text-decoration: none; font-weight: bold; transition: 0.3s; }
        
        body.light-mode { color: #111; background: radial-gradient(circle at center, #ffffff, #e8e8e8, #dcdcdc); }
        body.light-mode .navbar { background: rgba(255,255,255,0.95); border-bottom: 1px solid #ccc; }
        body.light-mode .navbar a, body.light-mode .navbar span { color: #111; }
        body.light-mode .section { background: #ffffff; border: 1px solid #ccc; }
        body.light-mode #annText, body.light-mode #aboutText, body.light-mode #statusText { background: #eee !important; color: #111 !important; }
        
        /* Mobil Düzeltme */
        @media (max-width: 600px) {
            .navbar { gap: 10px; padding: 10px; }
            .navbar a, .navbar span, .navbar select { font-size: 0.8em; }
            .container { padding-top: 150px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="#home" id="navHome">Home</a>
    <a href="#status" id="navStatus">Clan Status</a>
    <a href="#developers" id="navDev">Developers</a>
    <a href="#announcements" id="navAnn">Announcements</a>
    <a href="#about" id="navAbout">About Us</a>
    <span id="navActive">Active: Loading...</span>
    <select onchange="changeLang(this.value)" style="background:#222; color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;">
        <option value="en">EN</option> <option value="tr">TR</option> <option value="fr">FR</option> <option value="de">DE</option>
    </select>
    <select onchange="changeTheme(this.value)" style="background:#222; color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;">
        <option value="dark" id="optDark">Dark</option> <option value="light" id="optLight">Light</option>
    </select>
</nav>

<div class="container" id="home">
    <img src="logo.png" class="logo" alt="Logo">
    <div class="badge" id="recruiting">🟢 Recruiting Now</div>
    <h1 id="title" style="margin-top: 20px;">XRC | Rivals Clan</h1>
    <p id="subtitle" style="color: #888;">Official Rivals Clan Community</p>
    <a href="https://discord.gg/2dE9NAVHeb" target="_blank" class="join-btn" id="joinBtn">Join Discord</a>

    <div class="section" id="status">
        <h2 id="statusTitle">Clan Status</h2>
        <div id="statusText" style="margin-top:20px; font-weight:bold; background:#151515; padding:20px; border-radius:10px; color: var(--accent-green);">🟢 Training & Active</div>
    </div>

    <div class="section" id="announcements">
        <h2 id="annTitle">v0.035 Update</h2>
        <div id="annText" style="margin-top:20px; text-align:left; background:#151515; padding:20px; border-radius:10px;">✅ Mobile support added</div>
    </div>

    <footer id="footerText" style="margin-top: 50px; color: #555; font-size: 0.9em;">&copy; 2026 XRC | Rivals Clan. All rights reserved.</footer>
</div>

<script>
fetch('https://discord.com/api/guilds/1513976181056082061/widget.json')
    .then(r => r.json())
    .then(d => { document.getElementById('navActive').innerText = 'Active: ' + d.presence_count; })
    .catch(() => { document.getElementById('navActive').innerText = 'Active: -'; });

const translations = {
    en: { navHome: "Home", navStatus: "Status", navDev: "Devs", navAnn: "Updates", navAbout: "About", navActive: "Active", recruiting: "🟢 Recruiting Now", title: "XRC | Rivals Clan", joinBtn: "Join Discord", statusTitle: "Clan Status", statusText: "🟢 Training & Active", annTitle: "v0.035 Update", annText: "✅ Mobile support added", footerText: "&copy; 2026 XRC | Rivals Clan. All rights reserved.", optDark: "Dark", optLight: "Light" },
    tr: { navHome: "Ana Sayfa", navStatus: "Durum", navDev: "Geliştiriciler", navAnn: "Güncellemeler", navAbout: "Hakkımızda", navActive: "Aktif", recruiting: "🟢 Alımlar Açık", title: "XRC | Rivals Klanı", joinBtn: "Discord'a Katıl", statusTitle: "Klan Durumu", statusText: "🟢 Antrenman ve Aktif", annTitle: "v0.035 Güncellemesi", annText: "✅ Mobil destek eklendi", footerText: "&copy; 2026 XRC | Rivals Klanı. Tüm hakları saklıdır.", optDark: "Koyu", optLight: "Açık" },
    fr: { navHome: "Accueil", navStatus: "État", navDev: "Développeurs", navAnn: "Mises à jour", navAbout: "À Propos", navActive: "Actif", recruiting: "🟢 Recrutement Ouvert", title: "XRC | Rivals Clan", joinBtn: "Rejoindre Discord", statusTitle: "État du Clan", statusText: "🟢 Entraînement et Actif", annTitle: "Mise à jour v0.035", annText: "✅ Support mobile ajouté", footerText: "&copy; 2026 XRC | Rivals Clan. Tous droits réservés.", optDark: "Sombre", optLight: "Clair" },
    de: { navHome: "Start", navStatus: "Status", navDev: "Entwickler", navAnn: "Updates", navAbout: "Über Uns", navActive: "Aktiv", recruiting: "🟢 Rekrutierung Offen", title: "XRC | Rivals Clan", joinBtn: "Discord Beitreten", statusTitle: "Clan-Status", statusText: "🟢 Training und Aktiv", annTitle: "v0.035 Update", annText: "✅ Mobile Unterstützung hinzugefügt", footerText: "&copy; 2026 XRC | Rivals Clan. Alle Rechte vorbehalten.", optDark: "Dunkel", optLight: "Hell" }
};

function changeLang(lang) { 
    const t = translations[lang]; 
    for (let id in t) {
        if (document.getElementById(id)) document.getElementById(id).innerHTML = t[id];
    }
}
function changeTheme(theme){
    if(theme === 'light') document.body.classList.add('light-mode');
    else document.body.classList.remove('light-mode');
}
</script>
</body>
</html>
