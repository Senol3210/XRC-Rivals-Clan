<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRC | Rivals Clan</title>
    <style>
        :root { 
            --bg-body: #050505; --bg-grad: radial-gradient(circle at center, #2f2f2f, #111, #050505);
            --accent: #71ff9b; --text: white; --nav-bg: rgba(11, 11, 11, 0.9); --sec-bg: #0f0f0f;
        }
        .light-mode { 
            --bg-body: #f0f0f0; --bg-grad: radial-gradient(circle at center, #dcdcdc, #ffffff, #f0f0f0);
            --accent: #007bff; --text: #222; --nav-bg: rgba(255, 255, 255, 0.9); --sec-bg: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Segoe UI', Arial, sans-serif; color: var(--text); background: var(--bg-grad); min-height: 100vh; background-attachment: fixed; }
        
        .navbar { position: fixed; top: 0; width: 100%; background: var(--nav-bg); border-bottom: 1px solid #222; display: flex; justify-content: center; align-items: center; gap: 20px; padding: 18px; z-index: 1000; backdrop-filter: blur(5px); }
        .navbar a, .navbar span, .navbar select, .navbar button { color: var(--text); font-weight: bold; cursor: pointer; background: transparent; border: none; }
        
        .container { max-width: 900px; margin: 80px auto 0; padding: 50px 20px; text-align: center; }
        .logo { width: 180px; height: 180px; border-radius: 30px; border: 2px solid #333; }
        .badge { display: inline-block; padding: 8px 18px; border-radius: 50px; background: #111; color: var(--accent); border: 1px solid var(--accent); margin: 20px 0; }
        .section { background: var(--sec-bg); padding: 40px; border-radius: 20px; margin-top: 50px; border: 1px solid #222; }
        .join-btn { display: inline-block; padding: 15px 30px; background: var(--accent); border-radius: 10px; color: black; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#home" id="navHome">Home</a>
    <a href="#developers" id="navDev">Developers</a>
    <a href="#announcements" id="navAnn">Announcements</a>
    <span id="navActive" style="color:var(--accent)">Active: Loading...</span>
    <select onchange="changeLang(this.value)" style="background:#222; color:white; padding:5px; border-radius:5px;">
        <option value="en">English</option>
        <option value="tr">Türkçe</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
    </select>
    <button onclick="document.body.classList.toggle('light-mode')" style="padding:5px 10px; background:#222; color:white; border-radius:5px;">Theme</button>
</nav>

<div class="container">
    <img src="logo.png" class="logo">
    <div class="badge" id="recruiting">🟢 Recruiting Now</div>
    <h1 id="title">XRC | Rivals Clan</h1>
    <a href="https://discord.gg/2dE9NAVHeb" target="_blank" class="join-btn" id="joinBtn">Join Discord</a>

    <div class="section" id="developers">
        <h2 id="devTitle">Developers</h2>
        <div style="margin-top:20px;">Senol3210</div>
    </div>

    <div class="section" id="announcements">
        <h2 id="annTitle">Announcements</h2>
        <div id="annText" style="margin-top:20px; text-align:left; background:rgba(0,0,0,0.1); padding:20px; border-radius:10px;">
            🚀 v0.03 Update<br>✅ Light mode & Theme switcher integrated
        </div>
    </div>
</div>

<script>
fetch('https://discord.com/api/guilds/1513976181056082061/widget.json')
    .then(response => response.json())
    .then(data => { document.getElementById('navActive').innerText = 'Active: ' + data.presence_count; });

const translations = {
    en: { navHome: "Home", navDev: "Developers", navAnn: "Announcements", navActive: "Active", recruiting: "🟢 Recruiting Now", title: "XRC | Rivals Clan", joinBtn: "Join Discord", devTitle: "Developers", annTitle: "Announcements" },
    tr: { navHome: "Ana Sayfa", navDev: "Geliştiriciler", navAnn: "Duyurular", navActive: "Aktif", recruiting: "🟢 Alımlar Açık", title: "XRC | Rivals Klanı", joinBtn: "Discord'a Katıl", devTitle: "Geliştiriciler", annTitle: "Duyurular" }
};
function changeLang(lang) {
    const t = translations[lang] || translations['en'];
    for (let id in t) if(document.getElementById(id)) document.getElementById(id).innerHTML = (id === 'navActive') ? t[id] + ': ' + document.getElementById('navActive').innerText.split(': ')[1] : t[id];
}
</script>
</body>
</html>
