<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XRC | Rivals Clan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0a;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    max-width:700px;
    padding:40px;
}

.logo{
    font-size:90px;
    font-weight:bold;
    color:#bfbfbf;
    margin-bottom:20px;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

.subtitle{
    color:#9e9e9e;
    font-size:18px;
    margin-bottom:35px;
}

.desc{
    color:#cfcfcf;
    line-height:1.6;
    margin-bottom:40px;
}

.join-btn{
    display:inline-block;
    padding:16px 34px;
    background:#2a2a2a;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-size:18px;
    transition:.2s;
    border:1px solid #555;
}

.join-btn:hover{
    background:#3a3a3a;
    transform:translateY(-2px);
}

.footer{
    margin-top:40px;
    color:#666;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">✕</div>

<h1>XRC | Rivals Clan</h1>

<p class="subtitle">
Official Rivals Clan Community
</p>

<p class="desc">
Join XRC and become part of our growing Rivals community.
Verify your Roblox account, apply for clan membership,
participate in events, and compete with skilled players.
</p>

<a class="join-btn"
href="https://discord.gg/2dE9NAVHeb"
target="_blank">
Join Discord
</a>

<div class="footer">
XRC Rivals Clan © 2026
</div>

</div>

</body>
</html>
