<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRC | Rivals Clan</title>
    <style>
        :root { --bg-dark: #020202; --accent-green: #71ff9b; --accent-blue: #007bff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; color: white; background: radial-gradient(circle at center, #1a1a1a, #0a0a0a, #020202); background-size: 400% 400%; animation: gradientBG 15s ease infinite, fadeIn 1s ease forwards; opacity: 0; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        /* Navbar */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: rgba(5, 5, 5, 0.95); border-bottom: 1px solid #1a1a1a; display: flex; justify-content: center; align-items: center; gap: 20px; z-index: 1000; transition: 0.3s; }
        .navbar a, .navbar span { color: #ddd; text-decoration: none; font-weight: bold; font-size: 0.9em; cursor: pointer; }
        
        .container { max-width: 900px; margin: auto; padding: 120px 20px; text-align: center; }
        .logo { width: 180px; height: 180px; border-radius: 30px; animation: float 3s ease-in-out infinite; border: 2px solid #222; object-fit: cover; }
        .section { background: #070707; padding: 40px; border-radius: 20px; margin-top: 50px; border: 1px solid #1a1a1a; }
        .join-btn { display: inline-block; margin-top: 20px; padding: 15px 30px; background: #111; border-radius: 10px; color: white; text-decoration: none; font-weight: bold; transition: 0.3s; }

        body.light-mode { color: #111; background: #f4f4f4; }
        body.light-mode .navbar { background: #fff; border-bottom: 1px solid #ccc; }
        body.light-mode .navbar a, body.light-mode .navbar span { color: #111; }
        body.light-mode .section { background: #fff; border: 1px solid #ccc; }

        /* Mobil: Yan Menü */
        @media (max-width: 768px) {
            .navbar { flex-direction: column; height: 100%; width: 150px; align-items: flex-start; padding: 20px; gap: 20px; border-bottom: none; border-right: 1px solid #1a1a1a; }
            .container { padding-left: 180px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="#home">Home</a>
    <a href="#status">Status</a>
    <a href="#announcements">Updates</a>
    <span id="navActive">Active: Loading...</span>
    <select onchange="changeLang(this.value)" style="background:#111; color:white; border:none; padding:5px; border-radius:5px;">
        <option value="en">EN</option><option value="tr">TR</option>
    </select>
    <select onchange="changeTheme(this.value)" style="background:#111; color:white; border:none; padding:5px; border-radius:5px;">
        <option value="dark">Dark</option><option value="light">Light</option>
    </select>
</nav>

<div class="container" id="home">
    <img src="logo.png" class="logo" alt="Logo">
    <h1 style="margin-top: 20px;">XRC | Rivals Clan</h1>
    <a href="https://discord.gg/2dE9NAVHeb" target="_blank" class="join-btn">Join Discord</a>

    <div class="section" id="status">
        <h2>Clan Status</h2>
        <p style="margin-top:15px; color: var(--accent-green);">🟢 Training & Active</p>
    </div>

    <div class="section" id="announcements">
        <h2>v0.035 Update</h2>
        <p style="margin-top:15px;">✅ Mobile navigation updated.<br>✅ Dark mode darkened.</p>
    </div>
</div>

<script>
fetch('https://discord.com/api/guilds/1513976181056082061/widget.json')
    .then(r => r.json())
    .then(d => { document.getElementById('navActive').innerText = 'Active: ' + d.presence_count; })
    .catch(() => { document.getElementById('navActive').innerText = 'Active: -'; });

function changeTheme(theme){
    theme === 'light' ? document.body.classList.add('light-mode') : document.body.classList.remove('light-mode');
}
</script>
</body>
</html>
